<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">AI API Cost Guide logo</title>
  <desc id="desc">A modern logo mark for AI API Cost Guide with a pricing curve and API brackets.</desc>
  <defs>
    <linearGradient id="markGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#087568"/>
      <stop offset="0.55" stop-color="#0f8b7d"/>
      <stop offset="1" stop-color="#a45612"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#111827" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#f5f7f8"/>
  <rect x="74" y="70" width="1052" height="490" rx="28" fill="#ffffff" stroke="#d9e1e5" stroke-width="3" filter="url(#softShadow)"/>

  <g transform="translate(132 154)">
    <rect width="142" height="142" rx="34" fill="#111827"/>
    <path d="M45 44 25 71l20 27" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M97 44 117 71 97 98" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M47 93c18-36 39-55 67-58" fill="none" stroke="url(#markGradient)" stroke-width="11" stroke-linecap="round"/>
    <circle cx="47" cy="93" r="7" fill="#a45612"/>
    <circle cx="114" cy="35" r="7" fill="#0f8b7d"/>
  </g>

  <g transform="translate(318 164)">
    <text x="0" y="80" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="850" letter-spacing="0">AI API</text>
    <text x="0" y="168" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="850" letter-spacing="0">Cost Guide</text>
    <rect x="2" y="205" width="486" height="6" rx="3" fill="url(#markGradient)"/>
    <text x="0" y="270" fill="#5b6675" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="500" letter-spacing="0">Compare API pricing. Estimate monthly cost.</text>
  </g>
</svg>
